<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Contato</title>
        <link rel="stylesheet" href="reset.css">
        <link rel="stylesheet" href="style.css">
    </head>  
    <body>
        <header>
			<div class="caixa">
				<img src="./imagens/logo.png" alt="logo da página" class="logo">
			<nav>
				<ul>
					<li><a href="index.html">Home</a></li>
					<li><a href="produtos.html">Produtos</a></li>
					<li><a href="contato.html">Contato</a></li>
				</ul>
			</nav>	
        
            </div>
		</header>
        <main>
             <form> 
                <label for="nomesobrenome">Nome e sobrenome</label>
                <input type="text" id="nomesobrenome" class="inputPadrão" required>

                <label for="email">Email</label>
                <input type="email" id="email" class="inputPadrão" required placeholder="seuemail@domínio" >

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" class="inputPadrão" required placeholder="(xx)xxxxx-xxxx">
                
                <label for="mensagem">Mensagem</label>
                <textarea  id="mensagem" cols="70" rows="10" class="inputPadrão" required ></textarea>

                
                
                <fieldset>
                    <legend>Como prefere o nosso contato?</legend>
                    <label for="radio-email"><input type="radio" name="contato" id="radio-email">Email</label>
                    

                    <label for="radio-ligação"><input type="radio" name="contato" id="radio-ligação">Ligação</label>
                    

                    <label for="radio-whatsapp"><input type="radio" name="contato" id="radio-whatsapp" checked>Whatsapp</label>
                </fieldset>
                <fieldset class="seletor">
                    <legend>Em qual horário você prefere ser atendido?</legend>
                    <select>
                        <option>Manhã</option>
                        <option>Tarde</option>
                        <option>Noite</option>
                    </select>
                </fieldset>

                <label><input type="checkbox" class="checkbox" checked>Gostaria de receber nossas novidades por email?</label>

               <input type="submit" value="Enviar formulário" class="enviar">
                
            </form>
            <table>
                <thead>
                    <tr>
                        <th>dia</th>
                        <th>horário</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>segunda</td>
                        <td>8h ~ 20h</td>
                    </tr>
                    <tr>
                        <td>quarta</td>
                        <td>8h ~ 20h</td>
                    </tr>
                    <tr>
                        <td>sexta</td>
                        <td>8h ~ 20h</td>
                    </tr>
                  
                </tbody>
            </table>

        </main>
        <footer>
		
			<img src="./imagens/logo-branco.png" alt="logo da página" >
			<p class="copyright"> &copy; Copyright Barbearia Alura - 2019</p>
	
		</footer>
    </body>
    


</html>
